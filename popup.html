<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GA: Re-run with Inputs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1f2328;
      background: #ffffff;
      width: 320px;
      padding: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo svg { color: #1f2328; flex-shrink: 0; }

    .logo-text h1 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 11px;
      color: #656d76;
      margin-top: 1px;
    }

    hr {
      border: none;
      border-top: 1px solid #d0d7de;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .hint {
      font-size: 11px;
      color: #656d76;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    input[type="password"], input[type="text"] {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: #1f2328;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
    }

    .btn-save {
      padding: 6px 14px;
      background: #1a7f37;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-save:hover { background: #1c8139; }

    .btn-clear {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 5px;
      background: none;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 12px;
      color: #656d76;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
    }

    .btn-clear:hover { background: #f6f8fa; color: #d1242f; border-color: #d1242f; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 16px;
      text-align: center;
      font-weight: 500;
    }

    .status.success { color: #1a7f37; }
    .status.error { color: #d1242f; }

    .pat-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .pat-status.set {
      background: #dafbe1;
      color: #1a7f37;
      border: 1px solid #aceebb;
    }

    .pat-status.unset {
      background: #fff8c5;
      color: #9a6700;
      border: 1px solid #d4a72c;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .footer a {
      color: #0969da;
      font-size: 12px;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .scope-tag {
      display: inline-block;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 0 5px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: #1f2328;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
    </svg>
    <div class="logo-text">
      <h1>Re-run with Inputs</h1>
      <p>GitHub Actions helper</p>
    </div>
  </div>

  <hr />

  <div id="pat-status" class="pat-status unset">
    <span id="pat-status-icon">⚠</span>
    <span id="pat-status-text">No PAT configured — using GitHub session</span>
  </div>

  <label for="pat">Personal Access Token</label>
  <p class="hint">
    Required for private repos. Needs
    <span class="scope-tag">repo</span> and <span class="scope-tag">workflow</span> scopes.
  </p>
  <div class="input-row">
    <input type="password" id="pat" placeholder="ghp_…" autocomplete="off" spellcheck="false" />
    <button class="btn-save" id="save">Save</button>
  </div>
  <button class="btn-clear" id="clear">Remove saved token</button>

  <div class="status" id="status"></div>

  <div class="footer">
    <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=GitHub+Actions+Rerun" target="_blank">
      Create a classic PAT ↗
    </a>
    <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">
      Create a fine-grained PAT ↗
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
